name: Bug report
description: Report a reproducible Dungeon Blitz R problem.
type: bug
assignees:
  - Neodevils
  - Telahair
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: Describe the correct behavior.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened in the game or server?
      placeholder: Describe the current behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, dungeon/room, character, quest, or action that triggers the bug.
      placeholder: |
        1. Start the game with ...
        2. Go to ...
        3. Use ...
        4. See ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest area. Maintainers may translate this into labels.
      options:
        - Dungeon
        - Quest
        - Character
        - Multiplayer
        - Home
        - Client crash
        - Loot
        - Localization
        - Not sure
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, logs, crash text, or short clips if available.
      placeholder: Paste logs or drag files here.
    validations:
      required: false
  - type: dropdown
    id: mode
    attributes:
      label: Game mode
      options:
        - Singleplayer
        - Multiplayer
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, browser/projector, Node.js version, and branch or commit if known.
      placeholder: "Windows 11, Flash Projector 32, Node 20, main"
    validations:
      required: false
